services:
  config-server:
    build:
      context: .
      dockerfile: spring-petclinic-config-server/Dockerfile
    image: petclinic/config-server:dev
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - petclinic-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  discovery-server:
    build:
      context: .
      dockerfile: spring-petclinic-discovery-server/Dockerfile
    image: petclinic/discovery-server:dev
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - petclinic-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  customers-service:
    build:
      context: .
      dockerfile: spring-petclinic-customers-service/Dockerfile
    image: petclinic/customers-service:dev
    container_name: customers-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - petclinic-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  api-gateway:
    build:
      context: .
      dockerfile: spring-petclinic-api-gateway/Dockerfile
    image: petclinic/api-gateway:dev
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      customers-service:
        condition: service_healthy
    networks:
      - petclinic-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

networks:
  petclinic-net:
    driver: bridge