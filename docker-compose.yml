services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_DATABASE: petclinic
      MYSQL_ROOT_PASSWORD: petclinic
    networks:
      - petclinic-net
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -ppetclinic || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
  config-server:
    build:
      context: .
      dockerfile: spring-petclinic-config-server/Dockerfile
    image: petclinic/config-server:dev
    container_name: config-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - petclinic-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  discovery-server:
    build:
      context: .
      dockerfile: spring-petclinic-discovery-server/Dockerfile
    image: petclinic/discovery-server:dev
    container_name: discovery-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - petclinic-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  customers-service:
    build:
      context: .
      dockerfile: spring-petclinic-customers-service/Dockerfile
    image: petclinic/customers-service:dev
    container_name: customers-service
    environment:
      SPRING_PROFILES_ACTIVE: docker,mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/petclinic?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: petclinic
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - petclinic-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  api-gateway:
    build:
      context: .
      dockerfile: spring-petclinic-api-gateway/Dockerfile
    image: petclinic/api-gateway:dev
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      customers-service:
        condition: service_healthy
    networks:
      - petclinic-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

networks:
  petclinic-net:
    driver: bridge

volumes:
  mysql-data: